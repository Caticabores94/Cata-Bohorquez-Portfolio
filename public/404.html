<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname.replace(/^\/Cata-Bohorquez-Portfolio/, "");
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        var redirect = "/Cata-Bohorquez-Portfolio/?p=" + encodeURIComponent(path + search + hash);
        window.location.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
